<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvis - 你的AI助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px 40px;
            max-width: 680px;
            width: 100%;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.35);
        }
        .avatar svg { width: 50px; height: 50px; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 0.9rem; color: #94a3b8; margin-bottom: 32px; }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 36px;
        }
        .feature-item {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 24px 16px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.2s, background 0.2s;
        }
        .feature-item:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.08);
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feature-item span {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s;
            margin: 0 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.45);
            transform: translateY(-2px);
        }
        .btn-outline {
            border: 1.5px solid rgba(255,255,255,0.25);
            color: #cbd5e1;
        }
        .btn-outline:hover {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.05);
        }
        footer {
            margin-top: 36px;
            font-size: 0.75rem;
            color: #64748b;
        }
        @media (max-width: 600px) {
            .features { grid-template-columns: 1fr; }
            .card { padding: 32px 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
        </div>
        <h1>Marvis</h1>
        <p class="subtitle">你的云端智能助手，随时随地解决问题</p>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon" style="background:rgba(102,126,234,0.15)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                    </svg>
                </div>
                <span>智能问答</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon" style="background:rgba(167,139,250,0.15)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <span>云端部署</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon" style="background:rgba(96,165,250,0.15)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9"/>
                    </svg>
                </div>
                <span>全球加速</span>
            </div>
        </div>

        <div>
            <a href="#" class="btn btn-primary">开始体验</a>
            <a href="https://github.com/zhco/marvis-site" class="btn btn-outline">GitHub</a>
        </div>

        <footer>Powered by Cloudflare Pages · 2026</footer>
    </div>
</body>
</html>
